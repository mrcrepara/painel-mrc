<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>⚽ Futsal Timer</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080c14;
    --panel: rgba(255,255,255,0.05);
    --border: rgba(255,255,255,0.09);
    --blue: #2a7fff;
    --blue-dim: rgba(42,127,255,0.15);
    --gold: #f5c842;
    --red: #ff3b3b;
    --green: #2ea84a;
    --white: #eef2ff;
    --muted: rgba(238,242,255,0.35);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; overscroll-behavior: none; }

  body {
    background: var(--bg);
    color: var(--white);
    font-family: 'Barlow Condensed', sans-serif;
    display: flex;
    flex-direction: column;
    min-height: 100dvh;
    overflow: hidden;
    position: relative;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background:
      repeating-linear-gradient(90deg,
        rgba(255,255,255,0.015) 0px, rgba(255,255,255,0.015) 1px,
        transparent 1px, transparent 44px),
      radial-gradient(ellipse at 50% 0%, #0d1a35 0%, #080c14 70%);
    pointer-events: none; z-index: 0;
  }

  .screen {
    position: relative; z-index: 1;
    display: flex; flex-direction: column;
    min-height: 100dvh;
    padding: 0 14px;
    padding-bottom: calc(12px + var(--safe-bottom));
    gap: 9px;
  }

  /* STATUS */
  .status-bar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 0 0;
    font-size: 12px; font-weight: 700;
    letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--muted);
  }

  .live-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--red); display: inline-block;
    margin-right: 5px; opacity: 0; transition: opacity 0.3s;
  }
  .live-dot.on { opacity: 1; animation: blink 1.1s ease-in-out infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

  /* PERIOD TABS */
  .period-tabs { display: flex; gap: 8px; }
  .p-tab {
    flex: 1; padding: 10px 6px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--panel);
    text-align: center;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 16px; letter-spacing: 0.08em;
    color: var(--muted); cursor: pointer;
    transition: all 0.2s; user-select: none;
  }
  .p-tab sub {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 10px; font-weight: 700;
    letter-spacing: 0.08em; display: block;
    color: var(--muted); margin-top: -2px;
  }
  .p-tab.active {
    background: var(--blue-dim);
    border-color: var(--blue);
    color: var(--blue);
  }
  .p-tab.active sub { color: var(--blue); opacity: 0.7; }

  /* TIMER */
  .timer-wrap {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 18px 16px 14px;
    text-align: center;
    position: relative; overflow: hidden;
  }
  .timer-wrap::before {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at 50% -20%, rgba(42,127,255,0.1) 0%, transparent 70%);
    pointer-events: none;
  }

  /* Progress bar */
  .progress-track {
    width: 100%; height: 4px;
    background: rgba(255,255,255,0.08);
    border-radius: 2px; margin-bottom: 14px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%; border-radius: 2px;
    background: linear-gradient(90deg, var(--blue), #7ab8ff);
    transition: width 0.5s linear, background 0.4s;
    width: 0%;
  }
  .progress-fill.danger { background: linear-gradient(90deg, var(--gold), var(--red)); }

  .timer-big {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(86px, 25vw, 118px);
    line-height: 0.88;
    letter-spacing: 0.04em;
    color: var(--white);
    text-shadow: 0 0 50px rgba(42,127,255,0.25);
    transition: color 0.4s, text-shadow 0.4s;
    user-select: none;
  }
  .timer-big.danger {
    color: var(--gold);
    text-shadow: 0 0 50px rgba(245,200,66,0.4);
    animation: pulse-num 0.8s ease-in-out infinite alternate;
  }
  @keyframes pulse-num { from{opacity:1} to{opacity:0.6} }

  .timer-sub {
    margin-top: 8px;
    font-size: 13px; font-weight: 700;
    letter-spacing: 0.15em; color: var(--muted);
    text-transform: uppercase;
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }

  /* TIMEOUT ROW */
  .timeout-row {
    display: flex; align-items: center; justify-content: space-between;
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 14px; padding: 10px 14px;
    gap: 8px;
  }
  .to-team { display: flex; flex-direction: column; align-items: center; gap: 4px; flex: 1; }
  .to-label { font-size: 11px; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); }
  .to-dots { display: flex; gap: 6px; }
  .to-dot {
    width: 18px; height: 18px; border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.2);
    background: transparent;
    cursor: pointer; touch-action: manipulation;
    transition: all 0.2s;
  }
  .to-dot.used { background: var(--blue); border-color: var(--blue); box-shadow: 0 0 8px rgba(42,127,255,0.5); }
  .to-sep { width: 1px; height: 36px; background: var(--border); }
  .to-btn {
    padding: 6px 14px; border-radius: 8px;
    border: 1px solid rgba(42,127,255,0.3);
    background: var(--blue-dim); color: var(--blue);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 15px; letter-spacing: 0.1em;
    cursor: pointer; touch-action: manipulation;
    transition: all 0.15s;
  }
  .to-btn:active { transform: scale(0.92); }
  .to-btn.counting { background: rgba(245,200,66,0.15); border-color: var(--gold); color: var(--gold); }

  /* TIMEOUT TIMER */
  .to-timer-wrap {
    display: none;
    background: rgba(245,200,66,0.08);
    border: 1px solid rgba(245,200,66,0.25);
    border-radius: 14px;
    padding: 12px 16px;
    text-align: center;
    animation: fadeIn 0.3s ease;
  }
  .to-timer-wrap.show { display: block; }
  .to-timer-label { font-size: 12px; font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase; color: var(--gold); margin-bottom: 4px; }
  .to-timer-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 46px; color: var(--gold);
    text-shadow: 0 0 20px rgba(245,200,66,0.4);
    line-height: 1;
  }

  /* SCOREBOARD */
  .scoreboard {
    display: grid; grid-template-columns: 1fr 44px 1fr;
    align-items: center;
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 20px; padding: 12px 10px;
  }
  .team-col { display: flex; flex-direction: column; align-items: center; gap: 5px; }
  .team-name-input {
    background: none; border: none;
    border-bottom: 1px solid rgba(255,255,255,0.12);
    color: var(--muted);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px; font-weight: 700;
    letter-spacing: 0.18em; text-transform: uppercase;
    text-align: center; width: 100%; outline: none;
    padding: 2px 4px;
  }
  .team-name-input:focus { border-color: var(--blue); color: var(--white); }
  .team-score-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 62px; line-height: 1;
    color: var(--white); user-select: none;
  }
  .score-btns { display: flex; gap: 6px; }
  .sc-btn {
    width: 38px; height: 34px; border-radius: 8px;
    border: 1px solid var(--border); background: var(--panel);
    color: var(--white); font-size: 20px; font-weight: 700;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: all 0.12s; touch-action: manipulation; line-height: 1;
  }
  .sc-btn:active { transform: scale(0.87); }
  .sc-btn.plus { color: var(--green); border-color: rgba(46,168,74,0.3); }
  .sc-btn.minus { color: var(--muted); }
  .score-sep {
    font-family: 'Bebas Neue', sans-serif; font-size: 38px;
    color: rgba(255,255,255,0.15); text-align: center;
    line-height: 1; margin-top: 16px;
  }

  /* FOULS */
  .fouls-row {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  .foul-block {
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 14px; padding: 10px 12px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .foul-info { display: flex; flex-direction: column; gap: 2px; }
  .foul-label { font-size: 11px; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); }
  .foul-count {
    font-family: 'Bebas Neue', sans-serif; font-size: 32px;
    color: var(--white); line-height: 1;
    transition: color 0.3s;
  }
  .foul-count.warn { color: var(--gold); text-shadow: 0 0 12px rgba(245,200,66,0.4); }
  .foul-count.danger-f { color: var(--red); text-shadow: 0 0 12px rgba(255,59,59,0.4); }
  .foul-btns { display: flex; flex-direction: column; gap: 4px; }
  .f-btn {
    width: 30px; height: 26px; border-radius: 6px;
    border: 1px solid var(--border); background: var(--panel);
    color: var(--white); font-size: 15px; font-weight: 700;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    touch-action: manipulation; transition: all 0.12s; line-height: 1;
  }
  .f-btn:active { transform: scale(0.87); }
  .f-btn.plus { color: var(--red); border-color: rgba(255,59,59,0.3); }
  .f-btn.minus { color: var(--muted); font-size: 13px; }
  .penalty-badge {
    font-size: 10px; font-weight: 700; letter-spacing: 0.1em;
    color: var(--red); text-transform: uppercase;
    opacity: 0; transition: opacity 0.3s;
  }
  .penalty-badge.show { opacity: 1; }

  /* MAIN CONTROLS */
  .main-controls { display: grid; grid-template-columns: 1fr 56px; gap: 10px; }
  .btn-play {
    padding: 16px;
    border-radius: 16px; border: none;
    background: linear-gradient(145deg, #2a7fff, #1250cc);
    color: #fff;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 24px; letter-spacing: 0.12em;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 10px;
    box-shadow: 0 6px 28px rgba(42,127,255,0.35);
    transition: all 0.15s; touch-action: manipulation;
  }
  .btn-play:active { transform: scale(0.96); }
  .btn-play.paused {
    background: linear-gradient(145deg, #d68000, #8a5000);
    box-shadow: 0 6px 28px rgba(214,128,0,0.35);
  }
  .btn-reset {
    border-radius: 16px; border: 1px solid var(--border);
    background: var(--panel); color: var(--muted);
    font-size: 22px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s; touch-action: manipulation;
  }
  .btn-reset:active { transform: scale(0.92); }

  /* EVENTS */
  .events-wrap {
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 20px; padding: 12px 14px;
    flex: 1; display: flex; flex-direction: column; min-height: 0;
  }
  .events-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 8px;
  }
  .events-title { font-size: 12px; font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted); }
  .clear-btn {
    font-size: 11px; color: rgba(255,255,255,0.2);
    cursor: pointer; letter-spacing: 0.1em;
    text-transform: uppercase; font-weight: 700;
    border: none; background: none; padding: 2px 6px;
    touch-action: manipulation;
  }
  .clear-btn:active { color: var(--red); }
  .event-chips { display: flex; gap: 7px; flex-wrap: wrap; margin-bottom: 8px; }
  .chip {
    padding: 7px 12px; border-radius: 50px;
    border: 1px solid var(--border); background: var(--panel);
    color: var(--white); font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px; font-weight: 700; letter-spacing: 0.06em;
    cursor: pointer; touch-action: manipulation;
    transition: all 0.12s; display: flex; align-items: center; gap: 4px;
  }
  .chip:active { transform: scale(0.92); }
  .chip.yellow { border-color: rgba(245,200,66,0.4); color: var(--gold); }
  .chip.red    { border-color: rgba(255,59,59,0.4); color: var(--red); }
  .chip.goal   { border-color: rgba(46,168,74,0.4); color: var(--green); }
  .chip.blue-c { border-color: rgba(42,127,255,0.4); color: var(--blue); }

  .events-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 3px; }
  .events-list::-webkit-scrollbar { width: 2px; }
  .events-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 2px; }
  .ev-item {
    display: flex; align-items: center; gap: 10px;
    padding: 6px 8px; border-radius: 8px;
    font-size: 13px; font-weight: 600; letter-spacing: 0.04em;
    color: rgba(255,255,255,0.75);
    border-bottom: 1px solid rgba(255,255,255,0.05);
    animation: slideIn 0.25s ease;
  }
  @keyframes slideIn { from{opacity:0;transform:translateY(-5px)} to{opacity:1;transform:translateY(0)} }
  @keyframes fadeIn  { from{opacity:0} to{opacity:1} }
  .ev-min { font-family: 'Bebas Neue', sans-serif; font-size: 16px; color: var(--gold); min-width: 32px; }
  .empty-events { text-align: center; color: rgba(255,255,255,0.15); font-size: 13px; letter-spacing: 0.1em; padding: 12px 0; }

  /* flash */
  #flash { position: fixed; inset: 0; background: #fff; opacity: 0; pointer-events: none; z-index: 999; }
  #flash.go { animation: fl 0.4s ease-out forwards; }
  @keyframes fl { 0%{opacity:0.5} 100%{opacity:0} }
</style>
</head>
<body>
<div id="flash"></div>

<div class="screen">

  <!-- Status -->
  <div class="status-bar">
    <span>⚽ Futsal · 15 min</span>
    <span><span class="live-dot" id="liveDot"></span><span id="liveLabel">PARADO</span></span>
  </div>

  <!-- Period tabs -->
  <div class="period-tabs">
    <div class="p-tab active" id="tab1" onclick="setPeriod(1)">1.º TEMPO<sub>15 min</sub></div>
    <div class="p-tab" id="tab2" onclick="setPeriod(2)">2.º TEMPO<sub>15 min</sub></div>
    <div class="p-tab" id="tabET" onclick="setPeriod(3)">PROL.<sub>Extra</sub></div>
  </div>

  <!-- Timer -->
  <div class="timer-wrap">
    <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
    <div class="timer-big" id="timerBig">15:00</div>
    <div class="timer-sub" id="periodName">1.º Tempo · 15 minutos</div>
  </div>

  <!-- Time-outs -->
  <div class="timeout-row">
    <div class="to-team">
      <div class="to-label" id="toLabelA">CASA</div>
      <div class="to-dots">
        <div class="to-dot" id="toA0" onclick="useTo(1,0)"></div>
        <div class="to-dot" id="toA1" onclick="useTo(1,1)"></div>
      </div>
    </div>
    <div class="to-sep"></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:4px;">
      <span style="font-size:11px;font-weight:700;letter-spacing:0.15em;text-transform:uppercase;color:var(--muted)">Time-Out</span>
      <button class="to-btn" id="toBtn" onclick="toggleTimeout()">▶ 1:00</button>
    </div>
    <div class="to-sep"></div>
    <div class="to-team">
      <div class="to-label" id="toLabelB">FORA</div>
      <div class="to-dots">
        <div class="to-dot" id="toB0" onclick="useTo(2,0)"></div>
        <div class="to-dot" id="toB1" onclick="useTo(2,1)"></div>
      </div>
    </div>
  </div>

  <!-- Timeout countdown -->
  <div class="to-timer-wrap" id="toTimerWrap">
    <div class="to-timer-label">⏸ Time-Out em curso</div>
    <div class="to-timer-num" id="toTimerNum">1:00</div>
  </div>

  <!-- Scoreboard -->
  <div class="scoreboard">
    <div class="team-col">
      <input class="team-name-input" id="name1" value="CASA" maxlength="8" oninput="syncNames()"/>
      <div class="team-score-num" id="sc1">0</div>
      <div class="score-btns">
        <button class="sc-btn plus" ontouchstart="" onclick="goal(1)">+</button>
        <button class="sc-btn minus" ontouchstart="" onclick="undoGoal(1)">−</button>
      </div>
    </div>
    <div class="score-sep">:</div>
    <div class="team-col">
      <input class="team-name-input" id="name2" value="FORA" maxlength="8" oninput="syncNames()"/>
      <div class="team-score-num" id="sc2">0</div>
      <div class="score-btns">
        <button class="sc-btn plus" ontouchstart="" onclick="goal(2)">+</button>
        <button class="sc-btn minus" ontouchstart="" onclick="undoGoal(2)">−</button>
      </div>
    </div>
  </div>

  <!-- Fouls -->
  <div class="fouls-row">
    <div class="foul-block">
      <div class="foul-info">
        <span class="foul-label">Faltas Casa</span>
        <span class="foul-count" id="fouls1">0</span>
        <span class="penalty-badge" id="pen1">⚠ Penalti livre</span>
      </div>
      <div class="foul-btns">
        <button class="f-btn plus" ontouchstart="" onclick="addFoul(1)">+</button>
        <button class="f-btn minus" ontouchstart="" onclick="rmFoul(1)">−</button>
      </div>
    </div>
    <div class="foul-block">
      <div class="foul-info">
        <span class="foul-label">Faltas Fora</span>
        <span class="foul-count" id="fouls2">0</span>
        <span class="penalty-badge" id="pen2">⚠ Penalti livre</span>
      </div>
      <div class="foul-btns">
        <button class="f-btn plus" ontouchstart="" onclick="addFoul(2)">+</button>
        <button class="f-btn minus" ontouchstart="" onclick="rmFoul(2)">−</button>
      </div>
    </div>
  </div>

  <!-- Main controls -->
  <div class="main-controls">
    <button class="btn-play" id="playBtn" ontouchstart="" onclick="toggleTimer()">
      <span id="playIcon">▶</span>
      <span id="playLabel">INICIAR</span>
    </button>
    <button class="btn-reset" ontouchstart="" onclick="resetTimer()">↺</button>
  </div>

  <!-- Events -->
  <div class="events-wrap">
    <div class="events-header">
      <span class="events-title">📋 Eventos</span>
      <button class="clear-btn" onclick="clearEvents()">Limpar</button>
    </div>
    <div class="event-chips">
      <button class="chip goal"   ontouchstart="" onclick="addEvent('⚽','Golo')">⚽ Golo</button>
      <button class="chip yellow" ontouchstart="" onclick="addEvent('🟨','Amarelo')">🟨 Amarelo</button>
      <button class="chip red"    ontouchstart="" onclick="addEvent('🟥','Vermelho')">🟥 Vermelho</button>
      <button class="chip blue-c" ontouchstart="" onclick="addEvent('🔄','Substituição')">🔄 Subs.</button>
      <button class="chip"        ontouchstart="" onclick="addEvent('🤕','Lesão')">🤕 Lesão</button>
    </div>
    <div class="events-list" id="evList">
      <div class="empty-events">Sem eventos — adiciona acima</div>
    </div>
  </div>

</div>

<script>
  const HALF = 15 * 60; // 15 minutos em segundos
  const TO_DURATION = 60; // time-out 1 minuto

  let running = false;
  let secsLeft = HALF;  // conta decrescente
  let interval = null;
  let period = 1;
  let scores = [0, 0];
  let fouls = [0, 0];
  let timeouts = [[false,false],[false,false]]; // [team][slot]
  let events = [];
  let toRunning = false;
  let toSecsLeft = TO_DURATION;
  let toInterval = null;

  const PERIOD_LABELS = ['1.º Tempo','2.º Tempo','Prolongamento'];

  function pad(n){ return String(n).padStart(2,'0'); }
  function fmtSecs(s){ return pad(Math.floor(s/60)) + ':' + pad(s%60); }

  function getElapsed(){ return HALF - secsLeft; }
  function getDisplayMin(){ return Math.ceil(getElapsed()/60); }

  function render(){
    const el = document.getElementById('timerBig');
    if(period < 3){
      el.textContent = fmtSecs(secsLeft);
    } else {
      // prolongamento: conta crescente
      el.textContent = fmtSecs(HALF - secsLeft);
    }

    const danger = secsLeft <= 120 && period < 3; // últimos 2 min
    el.classList.toggle('danger', danger && running);

    // progress bar (só para tempos regulares)
    const fill = document.getElementById('progressFill');
    if(period < 3){
      const pct = ((HALF - secsLeft) / HALF) * 100;
      fill.style.width = pct + '%';
      fill.classList.toggle('danger', danger);
    } else {
      fill.style.width = '0%';
    }
  }

  function setLive(on){
    document.getElementById('liveDot').classList.toggle('on', on);
    document.getElementById('liveLabel').textContent = on ? 'EM JOGO' : 'PARADO';
  }

  function toggleTimer(){
    if(running) pause(); else start();
  }

  function start(){
    if(secsLeft <= 0 && period < 3) return;
    running = true;
    setLive(true);
    document.getElementById('playBtn').classList.add('paused');
    document.getElementById('playIcon').textContent = '⏸';
    document.getElementById('playLabel').textContent = 'PAUSAR';
    interval = setInterval(() => {
      if(period < 3){
        secsLeft--;
        if(secsLeft <= 0){ secsLeft = 0; endPeriod(); }
      } else {
        secsLeft--; // prolongamento usa secsLeft como contador crescente (começa em HALF)
      }
      render();
    }, 1000);
  }

  function pause(){
    running = false;
    clearInterval(interval);
    setLive(false);
    document.getElementById('playBtn').classList.remove('paused');
    document.getElementById('playIcon').textContent = '▶';
    document.getElementById('playLabel').textContent = 'CONTINUAR';
    render();
  }

  function resetTimer(){
    pause();
    secsLeft = HALF;
    document.getElementById('playLabel').textContent = 'INICIAR';
    render();
  }

  function endPeriod(){
    pause();
    flash();
    vibrate([60,40,60,40,100]);
    addEvent('🔔', period === 1 ? 'Fim do 1.º Tempo' : 'Fim do Jogo');
    if(period === 1){
      setTimeout(() => {
        if(confirm('Passar para o 2.º Tempo?')) setPeriod(2);
      }, 600);
    }
  }

  function setPeriod(p){
    pause();
    period = p;
    secsLeft = HALF;
    fouls = [0,0];
    renderFouls();
    [1,2,3].forEach(i => {
      const id = i===3?'tabET':'tab'+i;
      document.getElementById(id).classList.toggle('active', i===p);
    });
    document.getElementById('periodName').textContent = PERIOD_LABELS[p-1] + (p<3 ? ' · 15 minutos' : '');
    document.getElementById('playLabel').textContent = 'INICIAR';
    if(p===2) addEvent('🔔','Intervalo');
    if(p===3) addEvent('🔔','Prolongamento');
    flash();
    render();
  }

  /* TIMEOUT */
  function toggleTimeout(){
    if(toRunning){
      clearInterval(toInterval);
      toRunning = false;
      toSecsLeft = TO_DURATION;
      document.getElementById('toTimerWrap').classList.remove('show');
      document.getElementById('toBtn').classList.remove('counting');
      document.getElementById('toBtn').textContent = '▶ 1:00';
    } else {
      toRunning = true;
      document.getElementById('toTimerWrap').classList.add('show');
      document.getElementById('toBtn').classList.add('counting');
      toInterval = setInterval(() => {
        toSecsLeft--;
        document.getElementById('toTimerNum').textContent = fmtSecs(toSecsLeft);
        document.getElementById('toBtn').textContent = '■ ' + fmtSecs(toSecsLeft);
        if(toSecsLeft <= 0){
          clearInterval(toInterval);
          toRunning = false;
          toSecsLeft = TO_DURATION;
          document.getElementById('toTimerWrap').classList.remove('show');
          document.getElementById('toBtn').classList.remove('counting');
          document.getElementById('toBtn').textContent = '▶ 1:00';
          vibrate([40,30,40]);
        }
      }, 1000);
    }
  }

  function useTo(team, slot){
    const i = team - 1;
    timeouts[i][slot] = !timeouts[i][slot];
    const id = (team===1?'toA':'toB') + slot;
    document.getElementById(id).classList.toggle('used', timeouts[i][slot]);
  }

  function syncNames(){
    document.getElementById('toLabelA').textContent = document.getElementById('name1').value || 'CASA';
    document.getElementById('toLabelB').textContent = document.getElementById('name2').value || 'FORA';
  }

  /* SCORE */
  function goal(team){
    scores[team-1]++;
    document.getElementById('sc'+team).textContent = scores[team-1];
    const name = document.getElementById('name'+team).value || (team===1?'Casa':'Fora');
    addEvent('⚽','Golo — ' + name);
    vibrate([30,20,30]);
  }
  function undoGoal(team){
    if(scores[team-1]>0){ scores[team-1]--; document.getElementById('sc'+team).textContent = scores[team-1]; }
  }

  /* FOULS */
  function addFoul(team){
    fouls[team-1]++;
    renderFouls();
    addEvent('📣','Falta — ' + (document.getElementById('name'+team).value || (team===1?'Casa':'Fora')));
  }
  function rmFoul(team){
    if(fouls[team-1]>0){ fouls[team-1]--; renderFouls(); }
  }
  function renderFouls(){
    [1,2].forEach(t => {
      const f = fouls[t-1];
      const el = document.getElementById('fouls'+t);
      el.textContent = f;
      el.className = 'foul-count' + (f>=6?' danger-f':f>=4?' warn':'');
      document.getElementById('pen'+t).classList.toggle('show', f>=6);
    });
  }

  /* EVENTS */
  function addEvent(icon, label){
    const elapsed = getElapsed();
    const min = Math.floor(elapsed/60);
    const sec = elapsed%60;
    const t = running ? (pad(min)+':'+pad(sec)) : '--:--';
    events.unshift({icon, label, time: t});
    renderEvents();
  }
  function clearEvents(){ events=[]; renderEvents(); }
  function renderEvents(){
    const list = document.getElementById('evList');
    if(!events.length){ list.innerHTML='<div class="empty-events">Sem eventos — adiciona acima</div>'; return; }
    list.innerHTML = events.map(e =>
      `<div class="ev-item"><span class="ev-min">${e.time}</span><span>${e.icon}</span><span>${e.label}</span></div>`
    ).join('');
  }

  function flash(){
    const f=document.getElementById('flash');
    f.classList.remove('go'); void f.offsetWidth; f.classList.add('go');
  }
  function vibrate(p){ if(navigator.vibrate) navigator.vibrate(p); }

  render();
  renderEvents();
</script>
</body>
</html>
